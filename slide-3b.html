<style>
  .trust-toggles {
    display: flex;
    gap: 8px;
    margin: 0 0 14px 0;
    flex-wrap: wrap;
  }
  .trust-toggle {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 999px;
    background: var(--black-soft);
    color: var(--gray-mid);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }
  .trust-toggle:hover {
    color: var(--white);
    border-color: var(--gold);
  }
  .trust-toggle.active {
    color: var(--gold);
    border-color: var(--gold);
    background: rgba(212, 165, 116, 0.08);
  }

  .scenario-note {
    font-family: var(--font-body);
    font-style: italic;
    font-size: 15px;
    line-height: 1.4;
    color: var(--gray);
    margin: 0 0 14px 0;
    padding-left: 12px;
    border-left: 2px solid var(--gold);
  }
  .scenario-note em {
    color: var(--gold);
    font-style: normal;
    font-weight: 600;
    font-family: var(--font-display);
  }

  .trust-diagram {
    background: var(--black);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 22px 18px;
    margin: 0 0 14px 0;
  }

  .trust-diagram svg {
    display: block;
    width: 100%;
    height: auto;
  }

  .trust-diagram .band-label {
    fill: var(--gold);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1.6px;
  }
  .trust-diagram .band-caption {
    fill: var(--gray);
    font-family: var(--font-body);
    font-style: italic;
    font-size: 13px;
  }
  .trust-diagram .node-label {
    fill: var(--white);
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 16px;
  }
  .trust-diagram .node-sub {
    fill: var(--gray);
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 1.2px;
  }
  .trust-diagram .chip-label {
    fill: var(--gold);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1.4px;
  }
  .trust-diagram .chip-sub {
    fill: var(--white);
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 12px;
  }
  .trust-diagram .flow-label {
    fill: var(--gold);
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 1.2px;
  }
  .trust-diagram .inherit-label {
    fill: var(--gold);
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 1.2px;
  }
  .trust-diagram .ctx-title {
    fill: var(--gold);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 1.4px;
  }
  .trust-diagram .ctx-item {
    fill: var(--white);
    font-family: var(--font-body);
    font-size: 13px;
  }
  .trust-diagram .query-text,
  .trust-diagram .response-text {
    fill: var(--white);
    font-family: var(--font-body);
    font-style: italic;
    font-size: 14px;
  }

  @media (max-width: 768px) {
    .trust-diagram { padding: 12px 14px; }
    .trust-toggle { font-size: 10px; padding: 6px 10px; }
    .scenario-note { font-size: 13px; }
  }
</style>
</head>

<div class="slide" id="slide-3b">
  <div class="slide-number">04 / 06</div>
  <div class="slide-label">The AI Trust Layer</div>
  <h2 class="slide-title">Agents inherit human trust</h2>

  <div class="trust-toggles" role="tablist" aria-label="Use case">
    <button type="button" class="trust-toggle active" data-case="intro" role="tab" aria-selected="true">Find a warm intro</button>
    <button type="button" class="trust-toggle" data-case="reference" role="tab" aria-selected="false">Check a reference</button>
    <button type="button" class="trust-toggle" data-case="redflag" role="tab" aria-selected="false">Spot red flags</button>
    <button type="button" class="trust-toggle" data-case="advice" role="tab" aria-selected="false">Get candid feedback</button>
  </div>

  <div class="scenario-note" id="scenario-note"></div>

  <div class="trust-diagram">
    <svg viewBox="0 0 1000 380" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <marker id="trust-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4A574"/>
        </marker>
      </defs>

      <!-- ========== BAND 1: HUMANS MEET ========== -->
      <text x="500" y="14" text-anchor="middle" class="band-label">1 · HUMANS MEET</text>
      <text x="500" y="32" text-anchor="middle" class="band-caption">Verified in-person / calendar interactions build the trust graph.</text>

      <!-- Connector lines (behind chip) -->
      <line x1="190" y1="84" x2="430" y2="84" stroke="#D4A574" stroke-width="2"/>
      <line x1="570" y1="84" x2="810" y2="84" stroke="#D4A574" stroke-width="2"/>

      <!-- Founder node -->
      <rect x="70" y="54" width="120" height="60" rx="8" fill="#0D0D0D" stroke="#FFFFFF" stroke-width="2"/>
      <text x="130" y="90" text-anchor="middle" class="node-label" id="left-human">Founder</text>

      <!-- VC node -->
      <rect x="810" y="54" width="120" height="60" rx="8" fill="#0D0D0D" stroke="#FFFFFF" stroke-width="2"/>
      <text x="870" y="90" text-anchor="middle" class="node-label" id="right-human">VC</text>

      <!-- TRUST CIRCLE chip -->
      <rect x="430" y="68" width="140" height="32" rx="4" fill="#0D0D0D" stroke="#D4A574" stroke-width="1.5"/>
      <text x="500" y="88" text-anchor="middle" class="chip-label">TRUST CIRCLE</text>

      <!-- ========== INHERITANCE ARROWS ========== -->
      <line x1="130" y1="118" x2="130" y2="186" stroke="#D4A574" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#trust-arrow)"/>
      <text x="144" y="158" class="inherit-label">INHERITS TRUST</text>

      <line x1="870" y1="118" x2="870" y2="186" stroke="#D4A574" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#trust-arrow)"/>
      <text x="856" y="158" text-anchor="end" class="inherit-label">INHERITS TRUST</text>

      <!-- ========== BAND 2: AGENTS INHERIT THE TRUST ========== -->
      <text x="500" y="204" text-anchor="middle" class="band-label">2 · AGENTS INHERIT THE TRUST</text>
      <text x="500" y="222" text-anchor="middle" class="band-caption">One agent per verified human. Trust between humans = permission between agents.</text>

      <!-- Exchange channel -->
      <line x1="200" y1="272" x2="800" y2="272" stroke="#D4A574" stroke-width="2"/>

      <!-- Founder's Agent -->
      <rect x="60" y="236" width="140" height="72" rx="8" fill="#1A1A1A" stroke="#D4A574" stroke-width="2"/>
      <text x="130" y="262" text-anchor="middle" class="node-sub" id="left-agent-sub">FOUNDER'S</text>
      <text x="130" y="288" text-anchor="middle" class="node-label" style="font-size:18px;font-weight:700;">Agent</text>

      <!-- VC's Agent -->
      <rect x="800" y="236" width="140" height="72" rx="8" fill="#1A1A1A" stroke="#D4A574" stroke-width="2"/>
      <text x="870" y="262" text-anchor="middle" class="node-sub" id="right-agent-sub">VC'S</text>
      <text x="870" y="288" text-anchor="middle" class="node-label" style="font-size:18px;font-weight:700;">Agent</text>

      <!-- InTouch permission chip -->
      <rect x="430" y="246" width="140" height="52" rx="8" fill="#0D0D0D" stroke="#D4A574" stroke-width="2"/>
      <text x="500" y="266" text-anchor="middle" class="chip-label">INTOUCH</text>
      <text x="500" y="286" text-anchor="middle" class="chip-sub">permission layer</text>

      <!-- Flow labels (direction flips by scenario) -->
      <text id="left-flow-label" x="315" y="262" text-anchor="middle" class="flow-label">query →</text>
      <text id="right-flow-label" x="685" y="262" text-anchor="middle" class="flow-label">← response</text>

      <!-- Dynamic query / response body text -->
      <text id="left-body" x="315" y="294" text-anchor="middle" class="query-text"></text>
      <text id="right-body" x="685" y="294" text-anchor="middle" class="query-text"></text>

      <!-- ========== PRIVATE CONTEXT (dynamic) ========== -->
      <rect x="60" y="320" width="380" height="52" rx="6" fill="#0D0D0D" stroke="#737373" stroke-width="1.2" stroke-dasharray="4,4"/>
      <text x="74" y="338" class="ctx-title" id="left-ctx-title">FOUNDER · PRIVATE CONTEXT</text>
      <text id="left-ctx-items" x="74" y="360" class="ctx-item"></text>

      <rect x="560" y="320" width="380" height="52" rx="6" fill="#0D0D0D" stroke="#737373" stroke-width="1.2" stroke-dasharray="4,4"/>
      <text x="574" y="338" class="ctx-title" id="right-ctx-title">VC · PRIVATE CONTEXT</text>
      <text id="right-ctx-items" x="574" y="360" class="ctx-item"></text>
    </svg>
  </div>

  <div class="conclusion">Humans meet. Their agents inherit that trust. Private context flows between them — conversations no amount of public data can reproduce.</div>
</div>

<script src="nav.js"></script>
<script>
(function () {
  // direction: 'forward' = founder asks VC; 'reverse' = VC asks founder
  var cases = {
    intro: {
      direction: 'forward',
      query: '"Anyone know the CFO at Acme?"',
      response: '"Priya — met them twice."',
      founderCtx: 'my circle · who I want to reach · tie strength',
      vcCtx: 'my circle · who I’d intro for · past teammates',
      note: '<em>A warm path</em> — only possible because their humans met. Neither agent could surface it from public data.'
    },
    reference: {
      direction: 'reverse',
      query: '"Confirm Sarah shipped payments at Y?"',
      response: '"Yes — tech lead, 2022–2024."',
      founderCtx: 'former reports · shipped projects · work quality',
      vcCtx: 'candidate claims · hiring bar · diligence list',
      note: '<em>A verified reference</em> — only possible because their humans met. Neither agent could confirm it from public data.'
    },
    redflag: {
      direction: 'forward',
      query: '"Safe to take this term sheet?"',
      response: '"Pushed founders out. I’d pass."',
      founderCtx: 'active term sheets · investor options · timeline',
      vcCtx: 'prior deals · observed behavior · founder feedback',
      note: '<em>A candid warning</em> — only possible because their humans met. Neither agent could learn it from public data.'
    },
    advice: {
      direction: 'reverse',
      query: '"What did founders flag about us?"',
      response: '"You move fast. Push hard on numbers."',
      founderCtx: 'portfolio experience · post-investment behavior',
      vcCtx: 'our reputation · deal flow · blind spots',
      note: '<em>Trusted feedback</em> — only possible because their humans met. Neither agent could produce it from public data.'
    }
  };

  var leftBody = document.getElementById('left-body');
  var rightBody = document.getElementById('right-body');
  var leftFlow = document.getElementById('left-flow-label');
  var rightFlow = document.getElementById('right-flow-label');
  var leftCtxItems = document.getElementById('left-ctx-items');
  var rightCtxItems = document.getElementById('right-ctx-items');
  var note = document.getElementById('scenario-note');
  var toggles = document.querySelectorAll('.trust-toggle');

  function apply(key) {
    var c = cases[key];
    if (!c) return;

    // Flow labels + body text flip based on direction.
    // Founder is on the left (Agent rect), VC is on the right.
    if (c.direction === 'forward') {
      // Founder asks VC: query travels left->right, response travels right->left.
      leftFlow.textContent = 'query →';
      rightFlow.textContent = '← response';
      leftBody.textContent = c.query;    // founder's question, near founder
      rightBody.textContent = c.response; // VC's answer, near VC
    } else {
      // VC asks Founder: query travels right->left, response travels left->right.
      leftFlow.textContent = 'response →';
      rightFlow.textContent = '← query';
      leftBody.textContent = c.response;  // founder's answer, near founder
      rightBody.textContent = c.query;    // VC's question, near VC
    }

    leftCtxItems.textContent = c.founderCtx;
    rightCtxItems.textContent = c.vcCtx;
    note.innerHTML = c.note;

    toggles.forEach(function (btn) {
      var active = btn.dataset.case === key;
      btn.classList.toggle('active', active);
      btn.setAttribute('aria-selected', active ? 'true' : 'false');
    });
  }

  toggles.forEach(function (btn) {
    btn.setAttribute('data-nav-ignore', '');
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      apply(btn.dataset.case);
    });
  });

  apply('intro');
})();
</script>
</body>
