<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- To swap the active deck version, change the path below (v1/, v2/, v3/, …). -->
<meta http-equiv="refresh" content="0; url=v3/index.html">
<link rel="canonical" href="v3/index.html">
<title>InTouch — Investor Pitch</title>
<script>
  // Preserve query string + hash so links like ?viewer=Bob keep working through the redirect.
  var target = 'v3/index.html' + location.search + location.hash;
  window.location.replace(target);
</script>
</head>
<body>
<p>Redirecting to <a id="fallback-link" href="v3/index.html">the latest pitch deck</a>…</p>
<script>
  var l = document.getElementById('fallback-link');
  if (l) l.href = 'v3/index.html' + location.search + location.hash;
</script>
</body>
</html>
