<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- To swap the active deck version, change the path below (v1/, v2/, v3/, …). -->
<meta http-equiv="refresh" content="0; url=v3/index.html">
<link rel="canonical" href="v3/index.html">
<title>InTouch — Investor Pitch</title>
<script>
  // If a viewer name is in the URL, set the analytics cookie here so we can
  // redirect to a clean URL (no ?viewer= leftover in the address bar). The
  // cookie is on .pages.dev/, so /v3/analytics.js will read it on next load.
  (function () {
    try {
      var p = new URLSearchParams(location.search);
      var v = (p.get('viewer') || p.get('name') || '').trim();
      if (v) {
        var exp = new Date(Date.now() + 30 * 864e5).toUTCString();
        document.cookie = 'pitch_viewer=' + encodeURIComponent(v) + '; expires=' + exp + '; path=/; SameSite=Lax';
      }
    } catch (e) {}
    window.location.replace('v3/index.html' + location.hash);
  })();
</script>
</head>
<body>
<p>Redirecting to <a href="v3/index.html">the latest pitch deck</a>…</p>
</html>
