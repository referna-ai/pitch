name: Regenerate pitch PDF

on:
  push:
    branches: [main]
    paths:
      - 'v6/**/*.html'
      - 'v6/styles.css'
      - 'v6/nav.js'
      - 'v6/portraits/**'
      - 'v6/logos/**'

jobs:
  gen-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Generate PDF
        run: npm run gen-pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: referna-pitch-${{ github.sha }}
          path: v6/referna-pitch.pdf
          retention-days: 30
