name: Regenerate pitch PDF

on:
  push:
    branches: [main]
    paths:
      - 'v6/**/*.html'
      - 'v6/styles.css'
      - 'v6/nav.js'
      - 'v6/portraits/**'
      - 'v6/logos/**'

jobs:
  gen-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Generate PDF
        run: npm run gen-pdf

      - name: Commit updated PDF
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add v6/referna-pitch.pdf
          git diff --staged --quiet && echo "PDF unchanged, nothing to commit" && exit 0
          git commit -m "chore: regenerate pitch PDF [skip ci]"
          git push
