<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referna — Investor Pitch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="styles.css">
</head>
<body data-slide="index">


<div class="deck">

<div class="slide-hero">
<button class="copy-html-btn" type="button" data-nav-ignore aria-label="Copy deck as HTML">
    <svg viewBox="0 0 24 24" aria-hidden="true" width="16" height="16">
      <rect x="9" y="9" width="11" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <path d="M5 15 L5 5 L15 5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="copy-html-tooltip">Copy HTML</span>
  </button>
  <button class="pdf-download-btn" type="button" data-nav-ignore aria-label="Download deck as PDF">
    <svg viewBox="0 0 24 24" aria-hidden="true" width="16" height="16">
      <path d="M12 4 V15 M7 11 L12 16 L17 11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M5 19 H19" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <span class="pdf-download-tooltip">Download PDF</span>
  </button>
  <div class="wordmark">
    <img src="logos/lockup-white-on-black.svg" alt="referna" class="referna-lockup">
  </div>
  <div class="gold-rule"></div>
  <h1 class="tagline">Referral Network for<br><span class="gold">Independent Professionals</span></h1>
  <p class="subtitle">Referna matches independent professionals (fractional execs, lawyers, recruiters, and more) into referral circles where trusted peers refer clients to each other.</p>

  <div class="raise-kicker">Pre-Seed Round</div>

</div>

</div>


<script src="nav.js"></script>
<script src="copy-deck.js"></script>
<script src="download-pdf.js"></script>
</body>
</html>
