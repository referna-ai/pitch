<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S4 · Precedent — InTouch Pitch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="styles.css">
<style>
body[data-slide="slide-4"] .slide-title { margin-bottom: 10px; }
body[data-slide="slide-4"] .slide-title .gold { color: var(--gold); }
body[data-slide="slide-4"] .slide-title .bni-logo {
  height: 0.88em;
  width: auto;
  vertical-align: -0.08em;
  margin-right: 0.04em;
  filter: brightness(0) invert(1);
}

/* Horseshoe visual */
.horseshoe-stage {
  flex: 1;
  min-height: 0;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.horseshoe-stage svg {
  display: block;
  width: 100%;
  max-width: 1060px;
  height: auto;
}

.peer-face { fill: #1a1a1a; stroke: #505050; stroke-width: 1.5; }
.bni-ring  { fill: #241e19; stroke: var(--gold); stroke-width: 3; }

.arrow-line    { stroke: var(--gold); stroke-width: 2; fill: none; opacity: 0.7; }
.arrow-head    { fill: var(--gold); opacity: 0.7; }
.arrow-caption {
  font-family: 'Manrope', sans-serif;
  font-weight: 600;
  font-size: 15px;
  fill: var(--gray);
  text-anchor: middle;
}
.face-label {
  font-family: 'Manrope', sans-serif;
  font-weight: 700;
  font-size: 14px;
  fill: #fff;
  text-anchor: middle;
  letter-spacing: 0.05em;
}
.circle-label {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 18px;
  fill: rgba(212,165,116,0.85);
  text-anchor: middle;
  letter-spacing: 0.1em;
}
.circle-sublabel {
  font-family: 'Manrope', sans-serif;
  font-weight: 500;
  font-size: 14px;
  fill: rgba(212,165,116,0.45);
  text-anchor: middle;
  letter-spacing: 0.06em;
}
.bni-face-caption {
  font-family: 'Manrope', sans-serif;
  font-weight: 500;
  font-size: 14px;
  fill: rgba(255,255,255,0.45);
  text-anchor: middle;
}
</style>
</head>
<body data-slide="slide-4">


<div class="deck">

<div class="slide" id="slide-4">
  <div class="slide-number"></div>
  <div class="slide-label"></div>
  <h2 class="slide-title"><img class="bni-logo" src="logos/bni.png" alt="BNI">: Referral network — <span class="gold">$26.4B</span> referrals/year</h2>

  <div class="horseshoe-stage">
    <!-- Horseshoe at 80% scale of slide-3. Transform: new = old × 0.8 + (60, 30) -->
    <svg viewBox="0 0 1080 360" preserveAspectRatio="xMidYMid meet">
      <defs>
        <filter id="gs-s4" color-interpolation-filters="sRGB">
          <feColorMatrix type="saturate" values="0"/>
        </filter>
        <clipPath id="cp-s4-joe"><circle cx="202" cy="176" r="66"/></clipPath>
        <clipPath id="cp-s4-p1"><circle cx="633" cy="106" r="23"/></clipPath>
        <clipPath id="cp-s4-p2"><circle cx="706" cy="76"  r="23"/></clipPath>
        <clipPath id="cp-s4-p3"><circle cx="780" cy="106" r="23"/></clipPath>
        <clipPath id="cp-s4-p4"><circle cx="810" cy="178" r="23"/></clipPath>
        <clipPath id="cp-s4-p5"><circle cx="780" cy="250" r="23"/></clipPath>
        <clipPath id="cp-s4-p6"><circle cx="706" cy="280" r="23"/></clipPath>
        <clipPath id="cp-s4-p7"><circle cx="633" cy="250" r="23"/></clipPath>
      </defs>

      <!-- ── JOE (BNI member — gold ring, grayscale) ── -->
      <circle class="bni-ring" cx="202" cy="176" r="67"/>
      <image href="https://randomuser.me/api/portraits/men/32.jpg"
             x="136" y="110" width="132" height="132"
             clip-path="url(#cp-s4-joe)" filter="url(#gs-s4)"
             preserveAspectRatio="xMidYMid slice"/>
      <text class="face-label" x="202" y="266">JOE</text>
      <text class="bni-face-caption" x="202" y="283">A BNI member</text>

      <!-- ── 7 PEERS (horseshoe open toward Joe) ── -->
      <circle class="peer-face" cx="633" cy="106" r="25"/>
      <image href="https://randomuser.me/api/portraits/men/18.jpg"
             x="610" y="83" width="46" height="46"
             clip-path="url(#cp-s4-p1)" filter="url(#gs-s4)" preserveAspectRatio="xMidYMid slice"/>

      <circle class="peer-face" cx="706" cy="76" r="25"/>
      <image href="https://randomuser.me/api/portraits/women/34.jpg"
             x="683" y="53" width="46" height="46"
             clip-path="url(#cp-s4-p2)" filter="url(#gs-s4)" preserveAspectRatio="xMidYMid slice"/>

      <circle class="peer-face" cx="780" cy="106" r="25"/>
      <image href="https://randomuser.me/api/portraits/men/52.jpg"
             x="757" y="83" width="46" height="46"
             clip-path="url(#cp-s4-p3)" filter="url(#gs-s4)" preserveAspectRatio="xMidYMid slice"/>

      <circle class="peer-face" cx="810" cy="178" r="25"/>
      <image href="https://randomuser.me/api/portraits/women/4.jpg"
             x="787" y="155" width="46" height="46"
             clip-path="url(#cp-s4-p4)" filter="url(#gs-s4)" preserveAspectRatio="xMidYMid slice"/>

      <circle class="peer-face" cx="780" cy="250" r="25"/>
      <image href="https://randomuser.me/api/portraits/men/62.jpg"
             x="757" y="227" width="46" height="46"
             clip-path="url(#cp-s4-p5)" filter="url(#gs-s4)" preserveAspectRatio="xMidYMid slice"/>

      <circle class="peer-face" cx="706" cy="280" r="25"/>
      <image href="https://randomuser.me/api/portraits/women/18.jpg"
             x="683" y="257" width="46" height="46"
             clip-path="url(#cp-s4-p6)" filter="url(#gs-s4)" preserveAspectRatio="xMidYMid slice"/>

      <circle class="peer-face" cx="633" cy="250" r="25"/>
      <image href="https://randomuser.me/api/portraits/men/45.jpg"
             x="610" y="227" width="46" height="46"
             clip-path="url(#cp-s4-p7)" filter="url(#gs-s4)" preserveAspectRatio="xMidYMid slice"/>

      <!-- Ring label -->
      <text class="circle-label" x="706" y="175">BNI Chapter</text>
      <text class="circle-sublabel" x="706" y="193">8 members · weekly breakfast</text>

      <!-- ── ARROWS ── -->
      <path class="arrow-line" d="M 599 160 L 271 160"/>
      <polygon class="arrow-head" points="264,160 279,153 279,167"/>
      <text class="arrow-caption" x="435" y="145">Refers $65K of customers / year</text>

      <path class="arrow-line" d="M 271 192 L 599 192"/>
      <polygon class="arrow-head" points="606,192 591,185 591,199"/>
      <text class="arrow-caption" x="435" y="218">$65K of customers referred back / year</text>

      <!-- ── ANNOTATIONS ── -->

      <!-- 340K members — top-right, above ring (ring top is y≈51) -->
      <text x="1060" y="34" text-anchor="end"
            font-family="Manrope" font-size="26" font-weight="800"
            fill="#D4A574" letter-spacing="-0.02em">340K</text>
      <text x="1060" y="52" text-anchor="end"
            font-family="Manrope" font-size="14" font-weight="600"
            fill="#666666" letter-spacing="0.12em">MEMBERS</text>

      <!-- $800/yr + segments — right of Joe, below arrows (clear of labels) -->
      <text x="280" y="248"
            font-family="Manrope" font-size="18" font-weight="800" fill="#D4A574">$800/yr</text>
      <text x="280" y="266"
            font-family="Manrope" font-size="14" font-weight="500" fill="#666666">membership</text>
      <text x="280" y="288"
            font-family="Manrope" font-size="14" font-weight="700"
            fill="#D4A574" letter-spacing="0.09em">SEGMENTS</text>
      <text x="280" y="306"
            font-family="Manrope" font-size="14" font-weight="500" fill="#666666">Home-buyer · Wedding · Divorce ·</text>
      <text x="280" y="324"
            font-family="Manrope" font-size="14" font-weight="500" fill="#666666">Estate · Solopreneur circles</text>
    </svg>
  </div>

  <div class="conclusion">BNI proved <strong>the model and market</strong> but its legacy methods are limiting growth</div>
  <div class="sources">Sources: BNI Mid-Year Report 2025; bni.com; BNI US membership fees ($575–$849/yr, 1-year participation)</div>
</div>

</div>

<script src="nav.js"></script>
</body>
</html>
