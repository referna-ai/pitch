<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S4 · Precedent — InTouch Pitch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="styles.css">
<style>
body[data-slide="slide-4"] .slide-title { margin-bottom: 10px; }
body[data-slide="slide-4"] .slide-title .gold { color: var(--gold); }
body[data-slide="slide-4"] .slide-title .bni-logo {
  height: 0.88em;
  width: auto;
  vertical-align: -0.08em;
  margin-right: 0.04em;
  filter: brightness(0) invert(1);
}

/* Horseshoe visual */
.horseshoe-stage {
  flex: 1;
  min-height: 0;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.horseshoe-stage svg {
  display: block;
  width: 100%;
  max-width: 1060px;
  height: auto;
}

.peer-face { fill: #1a1a1a; stroke: #505050; stroke-width: 1.5; }
.bni-ring  { fill: #241e19; stroke: var(--gold); stroke-width: 3; }

.arrow-line    { stroke: var(--gold); stroke-width: 1.5; fill: none; opacity: 0.7; }
.arrow-head    { fill: var(--gold); opacity: 0.7; }
.arrow-caption {
  font-family: 'Manrope', sans-serif;
  font-weight: 600;
  font-size: 14px;
  fill: var(--gray);
  text-anchor: middle;
}
.face-label {
  font-family: 'Manrope', sans-serif;
  font-weight: 700;
  font-size: 14px;
  fill: #fff;
  text-anchor: middle;
  letter-spacing: 0.05em;
}
.circle-label {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 18px;
  fill: rgba(212,165,116,0.85);
  text-anchor: middle;
  letter-spacing: 0.1em;
}
.circle-sublabel {
  font-family: 'Manrope', sans-serif;
  font-weight: 500;
  font-size: 14px;
  fill: rgba(212,165,116,0.45);
  text-anchor: middle;
  letter-spacing: 0.06em;
}
.bni-face-caption {
  font-family: 'Manrope', sans-serif;
  font-weight: 500;
  font-size: 14px;
  fill: rgba(255,255,255,0.45);
  text-anchor: middle;
}
</style>
</head>
<body data-slide="slide-4">


<div class="deck">

<div class="slide" id="slide-4">
  <div class="slide-number"></div>
  <div class="slide-label"></div>
  <h2 class="slide-title"><img class="bni-logo" src="logos/bni.png" alt="BNI">: Referral network — <span class="gold">$26.4B</span> referrals/year</h2>

  <div class="horseshoe-stage">
    <svg viewBox="0 0 1080 360" preserveAspectRatio="xMidYMid meet">
      <defs>
        <filter id="gs-s4" color-interpolation-filters="sRGB">
          <feColorMatrix type="saturate" values="0"/>
        </filter>
        <clipPath id="cp-s4-joe"><circle cx="202" cy="151" r="66"/></clipPath>
        <clipPath id="cp-s4-p1"><circle cx="633" cy="81"  r="23"/></clipPath>
        <clipPath id="cp-s4-p2"><circle cx="706" cy="51"  r="23"/></clipPath>
        <clipPath id="cp-s4-p3"><circle cx="780" cy="81"  r="23"/></clipPath>
        <clipPath id="cp-s4-p4"><circle cx="810" cy="153" r="23"/></clipPath>
        <clipPath id="cp-s4-p5"><circle cx="780" cy="225" r="23"/></clipPath>
        <clipPath id="cp-s4-p6"><circle cx="706" cy="255" r="23"/></clipPath>
        <clipPath id="cp-s4-p7"><circle cx="633" cy="225" r="23"/></clipPath>
      </defs>

      <!-- ── JOE (BNI member — gold ring, grayscale) ── -->
      <circle class="bni-ring" cx="202" cy="151" r="67"/>
      <image href="https://randomuser.me/api/portraits/men/32.jpg"
             x="136" y="85" width="132" height="132"
             clip-path="url(#cp-s4-joe)" filter="url(#gs-s4)"
             preserveAspectRatio="xMidYMid slice"/>
      <text class="face-label" x="202" y="241">JOE</text>
      <text class="bni-face-caption" x="202" y="258">A BNI member</text>

      <!-- Below Joe: $800/yr membership (centered at Joe's x) -->
      <text x="202" y="278" text-anchor="middle"
            font-family="Manrope" font-size="18" font-weight="800" fill="#D4A574">$800/yr</text>
      <text x="202" y="296" text-anchor="middle"
            font-family="Manrope" font-size="14" font-weight="500" fill="#666666">membership</text>

      <!-- ── 7 PEERS (horseshoe open toward Joe) ── -->
      <circle class="peer-face" cx="633" cy="81"  r="25"/>
      <image href="https://randomuser.me/api/portraits/women/28.jpg"
             x="610" y="58" width="46" height="46"
             clip-path="url(#cp-s4-p1)" filter="url(#gs-s4)" preserveAspectRatio="xMidYMid slice"/>

      <circle class="peer-face" cx="706" cy="51"  r="25"/>
      <image href="https://randomuser.me/api/portraits/men/36.jpg"
             x="683" y="28" width="46" height="46"
             clip-path="url(#cp-s4-p2)" filter="url(#gs-s4)" preserveAspectRatio="xMidYMid slice"/>

      <circle class="peer-face" cx="780" cy="81"  r="25"/>
      <image href="https://randomuser.me/api/portraits/women/49.jpg"
             x="757" y="58" width="46" height="46"
             clip-path="url(#cp-s4-p3)" filter="url(#gs-s4)" preserveAspectRatio="xMidYMid slice"/>

      <circle class="peer-face" cx="810" cy="153" r="25"/>
      <image href="https://randomuser.me/api/portraits/men/74.jpg"
             x="787" y="130" width="46" height="46"
             clip-path="url(#cp-s4-p4)" filter="url(#gs-s4)" preserveAspectRatio="xMidYMid slice"/>

      <circle class="peer-face" cx="780" cy="225" r="25"/>
      <image href="https://randomuser.me/api/portraits/women/61.jpg"
             x="757" y="202" width="46" height="46"
             clip-path="url(#cp-s4-p5)" filter="url(#gs-s4)" preserveAspectRatio="xMidYMid slice"/>

      <circle class="peer-face" cx="706" cy="255" r="25"/>
      <image href="https://randomuser.me/api/portraits/men/53.jpg"
             x="683" y="232" width="46" height="46"
             clip-path="url(#cp-s4-p6)" filter="url(#gs-s4)" preserveAspectRatio="xMidYMid slice"/>

      <circle class="peer-face" cx="633" cy="225" r="25"/>
      <image href="https://randomuser.me/api/portraits/women/17.jpg"
             x="610" y="202" width="46" height="46"
             clip-path="url(#cp-s4-p7)" filter="url(#gs-s4)" preserveAspectRatio="xMidYMid slice"/>

      <!-- Ring label (two sublabel lines) -->
      <text class="circle-label"    x="706" y="148">BNI Chapter</text>
      <text class="circle-sublabel" x="706" y="167">8 members</text>
      <text class="circle-sublabel" x="706" y="185">weekly breakfast</text>

      <!-- ── ARROWS (reduced proportions) ── -->
      <path class="arrow-line" d="M 599 137 L 271 137"/>
      <polygon class="arrow-head" points="264,137 276,132 276,142"/>
      <text class="arrow-caption" x="435" y="124">Refers $65K of customers / year</text>

      <path class="arrow-line" d="M 271 167 L 599 167"/>
      <polygon class="arrow-head" points="606,167 594,162 594,172"/>
      <text class="arrow-caption" x="435" y="193">$65K of customers referred back / year</text>

      <!-- ── Below ring: 340K MEMBERS + SEGMENTS ── -->
      <text x="706" y="294" text-anchor="middle"
            font-family="Manrope" font-size="18" font-weight="800"
            fill="#D4A574" letter-spacing="-0.01em">340K MEMBERS</text>
      <text x="706" y="314" text-anchor="middle"
            font-family="Manrope" font-size="14" font-weight="700"
            fill="#666666" letter-spacing="0.09em">SEGMENTS · B2C PROFESSIONS</text>
    </svg>
  </div>

  <div class="conclusion">BNI proved <strong>the model and market</strong> but its legacy methods are limiting growth</div>
  <div class="sources">Sources: BNI Mid-Year Report 2025; bni.com; BNI US membership fees ($575–$849/yr, 1-year participation)</div>
</div>

</div>

<script src="nav.js"></script>
</body>
</html>
