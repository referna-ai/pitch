<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backup · BNI's $26.4B Secret — InTouch Pitch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="styles.css">
<style>
body[data-slide="slide-backup-bni"] .slide-title { margin-bottom: 10px; }
body[data-slide="slide-backup-bni"] .slide-title .gold { color: var(--gold); }
body[data-slide="slide-backup-bni"] .conclusion .gold { color: var(--gold); }

.horseshoe-stage {
  flex: 1;
  min-height: 0;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.horseshoe-stage svg {
  display: block;
  width: 100%;
  max-width: 1060px;
  height: auto;
}

.peer-face { fill: #1a1a1a; stroke: #505050; stroke-width: 1.5; }
.bni-ring  { fill: #241e19; stroke: var(--gold); stroke-width: 3; }

.arrow-line    { stroke: var(--gold); stroke-width: 2; fill: none; opacity: 0.7; }
.arrow-head    { fill: var(--gold); opacity: 0.7; }
.arrow-caption {
  font-family: 'Manrope', sans-serif;
  font-weight: 600;
  font-size: 15px;
  fill: var(--gray);
  text-anchor: middle;
}
.face-label {
  font-family: 'Manrope', sans-serif;
  font-weight: 700;
  font-size: 14px;
  fill: #fff;
  text-anchor: middle;
  letter-spacing: 0.05em;
}
.circle-label {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 18px;
  fill: rgba(212,165,116,0.85);
  text-anchor: middle;
  letter-spacing: 0.1em;
}
.circle-sublabel {
  font-family: 'Manrope', sans-serif;
  font-weight: 500;
  font-size: 14px;
  fill: rgba(212,165,116,0.45);
  text-anchor: middle;
  letter-spacing: 0.06em;
}
.bni-face-caption {
  font-family: 'Manrope', sans-serif;
  font-weight: 500;
  font-size: 14px;
  fill: rgba(255,255,255,0.45);
  text-anchor: middle;
}
</style>
</head>
<body data-slide="slide-backup-bni">

<div class="deck">

<div class="slide" id="slide-backup-bni">
  <div class="slide-number"></div>
  <div class="slide-label"></div>
  <h2 class="slide-title">BNI's <span class="gold">$26.4B</span> secret</h2>

  <div class="horseshoe-stage">
    <!-- Horseshoe at 80% scale of slide-3. Transform: new = old × 0.8 + (60, 30) -->
    <svg viewBox="0 0 1080 380" preserveAspectRatio="xMidYMid meet">
      <defs>
        <filter id="gs-bni" color-interpolation-filters="sRGB">
          <feColorMatrix type="saturate" values="0"/>
        </filter>
        <clipPath id="cp-bni-joe"><circle cx="202" cy="176" r="66"/></clipPath>
        <clipPath id="cp-bni-p1"><circle cx="633" cy="106" r="23"/></clipPath>
        <clipPath id="cp-bni-p2"><circle cx="706" cy="76"  r="23"/></clipPath>
        <clipPath id="cp-bni-p3"><circle cx="780" cy="106" r="23"/></clipPath>
        <clipPath id="cp-bni-p4"><circle cx="810" cy="178" r="23"/></clipPath>
        <clipPath id="cp-bni-p5"><circle cx="780" cy="250" r="23"/></clipPath>
        <clipPath id="cp-bni-p6"><circle cx="706" cy="280" r="23"/></clipPath>
        <clipPath id="cp-bni-p7"><circle cx="633" cy="250" r="23"/></clipPath>
      </defs>

      <!-- ── JOE (BNI member — gold ring, grayscale) ── -->
      <circle class="bni-ring" cx="202" cy="176" r="67"/>
      <image href="https://randomuser.me/api/portraits/men/32.jpg"
             x="136" y="110" width="132" height="132"
             clip-path="url(#cp-bni-joe)" filter="url(#gs-bni)"
             preserveAspectRatio="xMidYMid slice"/>
      <text class="face-label" x="202" y="270">JOE</text>
      <text class="bni-face-caption" x="202" y="287">A BNI member</text>

      <!-- ── 7 PEERS (horseshoe, open left toward Joe) ── -->
      <!-- p1: 135° top-left -->
      <circle class="peer-face" cx="633" cy="106" r="25"/>
      <image href="https://randomuser.me/api/portraits/men/18.jpg"
             x="610" y="83" width="46" height="46"
             clip-path="url(#cp-bni-p1)" filter="url(#gs-bni)" preserveAspectRatio="xMidYMid slice"/>

      <!-- p2: 90° top -->
      <circle class="peer-face" cx="706" cy="76" r="25"/>
      <image href="https://randomuser.me/api/portraits/women/34.jpg"
             x="683" y="53" width="46" height="46"
             clip-path="url(#cp-bni-p2)" filter="url(#gs-bni)" preserveAspectRatio="xMidYMid slice"/>

      <!-- p3: 45° top-right -->
      <circle class="peer-face" cx="780" cy="106" r="25"/>
      <image href="https://randomuser.me/api/portraits/men/52.jpg"
             x="757" y="83" width="46" height="46"
             clip-path="url(#cp-bni-p3)" filter="url(#gs-bni)" preserveAspectRatio="xMidYMid slice"/>

      <!-- p4: 0° right -->
      <circle class="peer-face" cx="810" cy="178" r="25"/>
      <image href="https://randomuser.me/api/portraits/women/4.jpg"
             x="787" y="155" width="46" height="46"
             clip-path="url(#cp-bni-p4)" filter="url(#gs-bni)" preserveAspectRatio="xMidYMid slice"/>

      <!-- p5: -45° bottom-right -->
      <circle class="peer-face" cx="780" cy="250" r="25"/>
      <image href="https://randomuser.me/api/portraits/men/62.jpg"
             x="757" y="227" width="46" height="46"
             clip-path="url(#cp-bni-p5)" filter="url(#gs-bni)" preserveAspectRatio="xMidYMid slice"/>

      <!-- p6: -90° bottom -->
      <circle class="peer-face" cx="706" cy="280" r="25"/>
      <image href="https://randomuser.me/api/portraits/women/18.jpg"
             x="683" y="257" width="46" height="46"
             clip-path="url(#cp-bni-p6)" filter="url(#gs-bni)" preserveAspectRatio="xMidYMid slice"/>

      <!-- p7: -135° bottom-left -->
      <circle class="peer-face" cx="633" cy="250" r="25"/>
      <image href="https://randomuser.me/api/portraits/men/45.jpg"
             x="610" y="227" width="46" height="46"
             clip-path="url(#cp-bni-p7)" filter="url(#gs-bni)" preserveAspectRatio="xMidYMid slice"/>

      <!-- Ring label (center of horseshoe) -->
      <text class="circle-label" x="706" y="175">BNI Circle</text>
      <text class="circle-sublabel" x="706" y="193">8 members</text>

      <!-- ── ARROWS ── -->
      <!-- TOP: peers → Joe ("Refers $65K of customers / year") -->
      <path class="arrow-line" d="M 599 160 L 271 160"/>
      <polygon class="arrow-head" points="264,160 279,153 279,167"/>
      <text class="arrow-caption" x="435" y="145">Refers $65K of customers / year</text>

      <!-- BOTTOM: Joe → peers ("$65K of customers referred back / year") -->
      <path class="arrow-line" d="M 271 192 L 599 192"/>
      <polygon class="arrow-head" points="606,192 591,185 591,199"/>
      <text class="arrow-caption" x="435" y="218">$65K of customers referred back / year</text>

      <!-- ── ANNOTATIONS ── -->

      <!-- 340K members — top-right, above ring -->
      <text x="1055" y="36" text-anchor="end"
            font-family="Manrope" font-size="26" font-weight="800"
            fill="#D4A574" letter-spacing="-0.02em">340K</text>
      <text x="1055" y="54" text-anchor="end"
            font-family="Manrope" font-size="14" font-weight="600"
            fill="#777777" letter-spacing="0.12em">MEMBERS</text>

      <!-- $800/yr membership + segments — right of Joe, below arrows -->
      <text x="285" y="235"
            font-family="Manrope" font-size="18" font-weight="800" fill="#D4A574">$800/yr</text>
      <text x="285" y="253"
            font-family="Manrope" font-size="14" font-weight="500" fill="#777777">membership</text>

      <text x="285" y="275"
            font-family="Manrope" font-size="14" font-weight="700"
            fill="#D4A574" letter-spacing="0.09em">SEGMENTS</text>
      <text x="285" y="293"
            font-family="Manrope" font-size="14" font-weight="500" fill="#777777">Home-buyer · Wedding · Divorce ·</text>

  <div class="conclusion">BNI reduced referrals from a timing problem to a <span class="gold">dating problem</span>.</div>
  <div class="sources">Sources: BNI Mid-Year Report 2025 (n=340K); industry pricing data (fractional executive engagement benchmarks, NAR/CFPB mortgage origination, advisor AUM benchmarks)</div>
</div>
