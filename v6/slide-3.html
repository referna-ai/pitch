<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S3 · Solution — InTouch Pitch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="styles.css">
<style>
/* Center the hero title */
body[data-slide="slide-3"] .slide-title {
  font-size: 32px;
  text-align: center;
  margin: 0 auto 0;
  max-width: 600px;
}
/* Horseshoe visual — fills available space */
.horseshoe-stage {
  flex: 1;
  min-height: 0;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.horseshoe-stage svg {
  display: block;
  width: 100%;
  max-width: 1060px;
  height: auto;
}

/* SVG face rings */
.peer-face { fill: #1a1a1a; stroke: #505050; stroke-width: 1.5; }
.ami-ring  { fill: #241e19; stroke: var(--gold); stroke-width: 3; }

/* Arrow */
.arrow-line { stroke: var(--gold); stroke-width: 2; fill: none; opacity: 0.7; }
.arrow-head { fill: var(--gold); opacity: 0.7; }
.arrow-caption {
  font-family: 'Manrope', sans-serif;
  font-weight: 600;
  font-size: 15px;
  fill: var(--gray);
  text-anchor: middle;
}
.arrow-num-bg { fill: #0d0d0d; stroke: rgba(212,165,116,0.45); stroke-width: 1; }
.arrow-num {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 13px;
  fill: var(--gold);
  text-anchor: middle;
  dominant-baseline: central;
}

/* Name labels under circles */
.face-label {
  font-family: 'Manrope', sans-serif;
  font-weight: 700;
  font-size: 13px;
  fill: #fff;
  text-anchor: middle;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.circle-label {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 18px;
  fill: rgba(212,165,116,0.85);
  text-anchor: middle;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.circle-sublabel {
  font-family: 'Manrope', sans-serif;
  font-weight: 500;
  font-size: 14px;
  fill: rgba(212,165,116,0.45);
  text-anchor: middle;
  letter-spacing: 0.06em;
}
.ami-profession {
  font-family: 'Manrope', sans-serif;
  font-weight: 500;
  font-size: 14px;
  fill: #fff;
  text-anchor: middle;
}

/* ── Portrait mobile: fit full horseshoe in viewport width ── */
@media (max-width: 600px) {
  .horseshoe-stage {
    flex: none;
    height: auto;
    min-height: 0;
    overflow: visible;
    justify-content: center;
  }
  .horseshoe-stage svg {
    width: 100%;
    height: auto;
    max-width: none;
  }
}
/* ── Landscape phone: slide scrolls freely; give horseshoe a height floor ── */
@media (max-height: 500px) {
  .horseshoe-stage { min-height: 120px; }
}

/* Flywheel line */
.flywheel-line {
  font-family: var(--font-body);
  font-style: italic;
  font-size: 20px;
  color: var(--gray-mid);
  text-align: center;
  margin-top: -30px;
  margin-bottom: 10px;
}
.flywheel-line strong { font-style: normal; font-weight: 600; color: var(--gray); }
/* ── All mobile: reset negative margin that overlaps SVG ── */
@media (max-width: 768px) {
  .flywheel-line { margin-top: 10px; }
}
</style>
</head>
<body data-slide="slide-3">

<div class="deck">

<div class="slide" id="slide-3">
  <div class="slide-number"></div>
  <div class="slide-label"></div>
  <h2 class="slide-title">Ami joins a circle of trusted peers who refer clients to each other.</h2>

  <div class="horseshoe-stage">
    <svg viewBox="0 0 1080 360" preserveAspectRatio="xMidYMid meet">
      <defs>
        <!-- Grayscale filter for all faces -->
        <filter id="gs" color-interpolation-filters="sRGB">
          <feColorMatrix type="saturate" values="0"/>
        </filter>
        <!-- Clip paths for all faces -->
        <clipPath id="cp-ami"><circle cx="178" cy="182" r="82"/></clipPath>
        <clipPath id="cp-p1"><circle cx="716" cy="95"  r="29"/></clipPath>
        <clipPath id="cp-p2"><circle cx="808" cy="57"  r="29"/></clipPath>
        <clipPath id="cp-p3"><circle cx="900" cy="95"  r="29"/></clipPath>
        <clipPath id="cp-p4"><circle cx="938" cy="185" r="29"/></clipPath>
        <clipPath id="cp-p5"><circle cx="900" cy="275" r="29"/></clipPath>
        <clipPath id="cp-p6"><circle cx="808" cy="313" r="29"/></clipPath>
        <clipPath id="cp-p7"><circle cx="716" cy="275" r="29"/></clipPath>
      </defs>

      <!-- ── AMI ── -->
      <circle class="ami-ring" cx="178" cy="182" r="84"/>
      <image href="ami.png"
             x="96" y="100" width="164" height="164"
             clip-path="url(#cp-ami)"
             filter="url(#gs)"
             preserveAspectRatio="xMidYMid slice"/>
      <text class="face-label" x="178" y="88">Ami</text>
      <text class="ami-profession" x="178" y="286"><tspan x="178" dy="0">The only</tspan><tspan x="178" dy="18">marketing strategy consultant</tspan><tspan x="178" dy="18">in his circle</tspan></text>

      <!-- ── CIRCLE PEERS ── -->
      <!-- p1: 135° -->
      <circle class="peer-face" cx="716" cy="95" r="31"/>
      <image href="https://randomuser.me/api/portraits/women/23.jpg"
             x="687" y="66" width="58" height="58"
             clip-path="url(#cp-p1)" filter="url(#gs)" preserveAspectRatio="xMidYMid slice"/>

      <!-- p2: 90° -->
      <circle class="peer-face" cx="808" cy="57" r="31"/>
      <image href="https://randomuser.me/api/portraits/men/44.jpg"
             x="779" y="28" width="58" height="58"
             clip-path="url(#cp-p2)" filter="url(#gs)" preserveAspectRatio="xMidYMid slice"/>

      <!-- p3: 45° -->
      <circle class="peer-face" cx="900" cy="95" r="31"/>
      <image href="https://randomuser.me/api/portraits/women/67.jpg"
             x="871" y="66" width="58" height="58"
             clip-path="url(#cp-p3)" filter="url(#gs)" preserveAspectRatio="xMidYMid slice"/>

      <!-- p4: 0° -->
      <circle class="peer-face" cx="938" cy="185" r="31"/>
      <image href="https://randomuser.me/api/portraits/men/81.jpg"
             x="909" y="156" width="58" height="58"
             clip-path="url(#cp-p4)" filter="url(#gs)" preserveAspectRatio="xMidYMid slice"/>

      <!-- p5: -45° -->
      <circle class="peer-face" cx="900" cy="275" r="31"/>
      <image href="https://randomuser.me/api/portraits/women/15.jpg"
             x="871" y="246" width="58" height="58"
             clip-path="url(#cp-p5)" filter="url(#gs)" preserveAspectRatio="xMidYMid slice"/>

      <!-- p6: -90° -->
      <circle class="peer-face" cx="808" cy="313" r="31"/>
      <image href="https://randomuser.me/api/portraits/men/7.jpg"
             x="779" y="284" width="58" height="58"
             clip-path="url(#cp-p6)" filter="url(#gs)" preserveAspectRatio="xMidYMid slice"/>

      <!-- p7: -135° -->
      <circle class="peer-face" cx="716" cy="275" r="31"/>
      <image href="https://randomuser.me/api/portraits/women/52.jpg"
             x="687" y="246" width="58" height="58"
             clip-path="url(#cp-p7)" filter="url(#gs)" preserveAspectRatio="xMidYMid slice"/>

      <text class="circle-label" x="808" y="162">Ami's Circle</text>
      <text class="circle-sublabel" x="808" y="182"><tspan x="808" dy="0">8 independent</tspan><tspan x="808" dy="18">professionals</tspan><tspan x="808" dy="18">One per profession</tspan></text>

      <!-- ── ARROWS ── -->
      <!-- TOP: circle → Ami at y=162 -->
      <path class="arrow-line" d="M 674 162 L 272 162"/>
      <polygon class="arrow-head" points="262,162 277,155 277,169"/>
      <text class="arrow-caption" x="472" y="143">Refers their clients to Ami</text>

      <!-- BOTTOM: Ami → circle at y=202 -->
      <path class="arrow-line" d="M 272 202 L 674 202"/>
      <polygon class="arrow-head" points="684,202 669,195 669,209"/>
      <text class="arrow-caption" x="472" y="232">Ami refers his clients back</text>
    </svg>
  </div>

  <p class="flywheel-line">Each referral builds more trust in the circle — that's the <strong>flywheel</strong>.</p>

  <div class="conclusion">For Ami — <strong>circles solve the next-client problem</strong>. He just needs to find his circle.</div>
  <div class="sources">Sources: InTouch interviews · BNI Mid-Year Report 2025</div>
</div>

</div>

<script src="nav.js"></script>
</body>
</html>
